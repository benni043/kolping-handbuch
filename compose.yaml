services:
  handbuch-postgres:
    image: postgres:14-alpine
    ports:
      - "127.0.0.1:3012:5432"
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always

  handbuch:
    build: .
    ports:
      - "3011:3000"
    depends_on:
      - handbuch-postgres
    volumes:
      - ./data:/app/data
    environment:
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      NUXT_POSTGRES_URL: ${NUXT_POSTGRES_URL}
    restart: always